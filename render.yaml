services:
  - type: web
    name: finovo-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: FRONTEND_URL
        value: https://finovo.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: finovo-db
          property: connectionString

databases:
  - name: finovo-db
    databaseName: finovo
    user: finovo
    plan: free
