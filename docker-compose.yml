services:
  db:
    image: postgres:16-alpine
    container_name: finovo_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: finovo
      POSTGRES_PASSWORD: finovo123
      POSTGRES_DB: finovo
    ports:
      - "5432:5432"
    volumes:
      - finovo_pgdata:/var/lib/postgresql/data

volumes:
  finovo_pgdata:
